<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
    <title>吕二哥MV音乐精选</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Roboto', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(145deg, #0b0c1a 0%, #12172f 100%);
            min-height: 100vh;
            padding: 0;
            margin: 0;
        }

        .container {
            max-width: 1600px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.96);
            border-radius: 0;
            padding: 8px 8px 0 8px;
            display: flex;
            flex-direction: column;
            height: 100vh;
            width: 100%;
            box-shadow: none;
        }

        .header {
            text-align: center;
            margin-bottom: 6px;
            flex-shrink: 0;
        }

        h1 {
            font-size: clamp(1.3rem, 4.5vw, 2rem);
            background: linear-gradient(125deg, #4f7df3 0%, #b345d6 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 2px;
            line-height: 1.3;
        }

        .subtitle {
            color: #5a6874;
            font-size: clamp(0.6rem, 2.8vw, 0.75rem);
            line-height: 1.2;
        }

        .stats-card {
            background: #f0f3fa;
            border-radius: 20px;
            padding: 6px 12px;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 6px;
            flex-shrink: 0;
        }

        .stats-info {
            display: flex;
            gap: 8px;
            align-items: center;
            flex-wrap: wrap;
        }

        .stat-badge {
            background: white;
            padding: 4px 12px;
            border-radius: 30px;
            font-size: 0.7rem;
            font-weight: 600;
            color: #4f7df3;
        }

        .orientation-badge {
            background: #e2e8f2;
            padding: 4px 10px;
            border-radius: 30px;
            font-size: 0.65rem;
            color: #2c3e50;
        }

        .search-info {
            font-size: 0.65rem;
            background: #eef2ff;
            padding: 4px 10px;
            border-radius: 30px;
        }

        .search-section {
            margin-bottom: 8px;
            flex-shrink: 0;
        }

        .search-box {
            display: flex;
            gap: 8px;
            width: 100%;
        }

        .search-input {
            flex: 1;
            padding: 8px 14px;
            border: 1.5px solid #e2e8f0;
            border-radius: 44px;
            font-size: 0.8rem;
            outline: none;
            background: white;
            min-width: 0;
        }

        .search-input:focus {
            border-color: #4f7df3;
            box-shadow: 0 0 0 2px rgba(79, 125, 243, 0.2);
        }

        .search-btn {
            padding: 8px 16px;
            background: linear-gradient(110deg, #4f7df3 0%, #a158e0 100%);
            color: white;
            border: none;
            border-radius: 44px;
            font-size: 0.75rem;
            font-weight: 600;
            cursor: pointer;
            white-space: nowrap;
        }

        .search-btn.reset {
            background: #6c7a8c;
        }

        .mv-list-container {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
            border-radius: 16px;
            min-height: 0;
            -webkit-overflow-scrolling: touch;
            margin-bottom: 6px;
        }

        @media (orientation: portrait) {
            .mv-list {
                display: flex;
                flex-direction: column;
                gap: 12px;
                padding-bottom: 8px;
            }

            .mv-item {
                background: white;
                border-radius: 20px;
                padding: 14px 16px;
                display: flex;
                align-items: center;
                gap: 14px;
                box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
                border: 1px solid #eef2ff;
                cursor: pointer;
                transition: all 0.1s ease;
            }

            .mv-item:active {
                background: #f5f7ff;
                transform: scale(0.99);
            }

            .mv-number {
                flex-shrink: 0;
                min-width: 80px;
                background: linear-gradient(135deg, #4f7df3, #9b51e0);
                padding: 10px 0;
                border-radius: 36px;
                text-align: center;
                font-weight: 800;
                font-size: 0.9rem;
                color: white;
                letter-spacing: 0.5px;
                box-shadow: 0 2px 6px rgba(0, 0, 0, 0.1);
            }

            .mv-name {
                flex: 1;
                font-weight: 700;
                font-size: 1rem;
                line-height: 1.4;
                word-break: break-word;
                white-space: normal;
                color: #111827;
            }

            .mv-artist {
                font-size: 0.8rem;
                font-weight: 600;
                color: #4f7df3;
                margin-left: 8px;
                display: inline-block;
            }

            .play-icon {
                font-size: 1.4rem;
                opacity: 0.6;
                flex-shrink: 0;
                margin-left: 6px;
            }
        }

        @media (orientation: landscape) {
            .mv-list {
                display: grid;
                grid-template-columns: repeat(5, 1fr);
                gap: 14px;
                padding-bottom: 8px;
            }

            .mv-item {
                display: flex;
                flex-direction: column;
                align-items: center;
                text-align: center;
                padding: 16px 10px;
                background: white;
                border-radius: 20px;
                cursor: pointer;
                transition: all 0.1s;
                border: 1px solid #eef2ff;
                box-shadow: 0 2px 6px rgba(0, 0, 0, 0.05);
            }

            .mv-item:active {
                background: #f0f3ff;
                transform: scale(0.98);
            }

            .mv-number {
                width: auto;
                padding: 6px 14px;
                margin-bottom: 12px;
                font-size: 0.8rem;
                font-weight: 800;
                background: linear-gradient(125deg, #4f7df3, #a853e6);
                border-radius: 36px;
                color: white;
                display: inline-block;
            }

            .mv-name {
                font-size: 0.88rem;
                font-weight: 700;
                word-break: break-word;
                max-width: 100%;
                line-height: 1.4;
                margin-bottom: 4px;
            }

            .mv-artist {
                display: block;
                font-size: 0.72rem;
                font-weight: 500;
                margin-top: 4px;
                color: #6c5ce7;
            }

            .play-icon {
                margin-top: 10px;
                opacity: 0.6;
                font-size: 1.1rem;
            }
        }

        @media (orientation: landscape) and (max-width: 1100px) {
            .mv-list { grid-template-columns: repeat(4, 1fr); gap: 12px; }
        }
        @media (orientation: landscape) and (max-width: 800px) {
            .mv-list { grid-template-columns: repeat(3, 1fr); gap: 10px; }
        }
        @media (orientation: landscape) and (max-width: 550px) {
            .mv-list { grid-template-columns: repeat(2, 1fr); }
        }

        .highlight {
            background: #fde047;
            color: #1e293b;
            padding: 2px 6px;
            border-radius: 12px;
            font-weight: 800;
            display: inline-block;
        }

        .mv-list-container::-webkit-scrollbar {
            width: 4px;
        }
        .mv-list-container::-webkit-scrollbar-track {
            background: #eef2ff;
            border-radius: 10px;
        }
        .mv-list-container::-webkit-scrollbar-thumb {
            background: #b9c3e9;
            border-radius: 10px;
        }

        .empty-state, .loading {
            text-align: center;
            padding: 48px 20px;
            background: #fef9e6;
            border-radius: 28px;
            color: #4b5563;
        }

        .loading .icon {
            font-size: 2.2rem;
            margin-bottom: 10px;
        }

        @media (max-width: 480px) and (orientation: portrait) {
            .container {
                padding: 6px 6px 0 6px;
            }
            .mv-item {
                padding: 12px 12px;
                gap: 10px;
            }
            .mv-number {
                min-width: 68px;
                font-size: 0.8rem;
                padding: 8px 0;
            }
            .mv-name {
                font-size: 0.9rem;
            }
            .mv-artist {
                font-size: 0.72rem;
            }
            .play-icon {
                font-size: 1.2rem;
            }
            .search-input {
                padding: 7px 12px;
                font-size: 0.75rem;
            }
            .search-btn {
                padding: 7px 12px;
                font-size: 0.7rem;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="header">
            <h1>🎵 吕二哥MV音乐精选</h1>
            <div class="subtitle">🎬 00001-01302 MV曲库 · 🎙️ 01302-01336 连载歌曲</div>
            <div class="subtitle" style="font-size:0.6rem;">🌐 数据源: cnliux.github.io/mv/ </div>
        </div>

        <div class="stats-card">
            <div class="stats-info">
                <span class="stat-badge" id="totalCount">📀 加载中...</span>
                <span class="orientation-badge" id="orientationDisplay">📱 竖屏模式</span>
            </div>
            <div class="search-info" id="searchInfo">💡 搜索歌名/歌手/编号</div>
        </div>

        <div class="search-section">
            <div class="search-box">
                <input type="text" id="searchInput" class="search-input" placeholder="🔍 搜索 MV 名称、歌手或编号..." autocomplete="off">
                <button id="searchBtn" class="search-btn">搜索</button>
                <button id="resetBtn" class="search-btn reset">重置</button>
            </div>
        </div>

        <div class="mv-list-container" id="mvListContainer">
            <div id="mvList" class="mv-list">
                <div class="loading">
                    <div class="icon">🎶</div>
                    <div>正在加载MV列表...</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const TXT_FILE_URL = 'https://cnliux.github.io/mv/list.txt';

        async function fetchAndDecode(url) {
            const response = await fetch(url);
            const buffer = await response.arrayBuffer();
            const bytes = new Uint8Array(buffer);
            if (bytes.length >= 3 && bytes[0] === 0xEF && bytes[1] === 0xBB && bytes[2] === 0xBF) {
                const decoder = new TextDecoder('utf-8');
                return decoder.decode(buffer.slice(3));
            }
            const utf8Decoder = new TextDecoder('utf-8');
            let utf8Text = utf8Decoder.decode(buffer);
            if (utf8Text.includes('�') || (!utf8Text.match(/[\u4e00-\u9fa5]/) && utf8Text.length > 10)) {
                try {
                    const gbkDecoder = new TextDecoder('gb18030');
                    const gbkText = gbkDecoder.decode(buffer);
                    if (gbkText.match(/[\u4e00-\u9fa5]/)) return gbkText;
                } catch(e) {}
                try {
                    const big5Decoder = new TextDecoder('big5');
                    const big5Text = big5Decoder.decode(buffer);
                    if (big5Text.match(/[\u4e00-\u9fa5]/)) return big5Text;
                } catch(e) {}
            } else if (utf8Text.match(/[\u4e00-\u9fa5]/)) {
                return utf8Text;
            }
            return utf8Text;
        }

        function parseMVFileName(filename) {
            // 严格匹配：数字.内容.扩展名
            const match = filename.match(/^(\d+)\.(.+?)\.(mp4|mp3|mkv|webm|flv|mov|avi)$/i);
            if (!match) {
                return { valid: false };
            }
            const id = match[1];
            let namePart = match[2];
            
            // 过滤无效条目：只有编号没有歌曲名，或者歌曲名太短且无中文
            if (!namePart || namePart.trim().length === 0) {
                return { valid: false };
            }
            
            // 检测是否是无效的纯编号（如 "00620" 这种只有数字没有任何文字的）
            if (/^\d+$/.test(namePart.trim())) {
                return { valid: false };
            }
            
            let songName = namePart;
            let artist = '';
            
            // 尝试提取歌手名（通常格式：歌曲名-歌手 或 歌手-歌曲名）
            if (namePart.includes('-')) {
                const parts = namePart.split('-');
                if (parts.length >= 2) {
                    // 智能判断：如果第一部分包含常见歌手特征或长度较短，作为歌手
                    artist = parts[0].trim();
                    songName = parts[1].trim();
                    // 如果提取后歌名过短而歌手较长，则交换（处理"王杰-一场游戏一场梦"这种格式）
                    if (songName.length < 2 && artist.length > 2) {
                        let tmp = songName;
                        songName = artist;
                        artist = tmp;
                    }
                }
            } else if (namePart.includes('_')) {
                const parts = namePart.split('_');
                artist = parts[0].trim();
                songName = parts[1] ? parts[1].trim() : parts[0].trim();
            }
            
            // 清理多余字符
            songName = songName.replace(/\[.*?\]|\(.*?\)/g, '').trim();
            artist = artist.replace(/\[.*?\]|\(.*?\)/g, '').trim();
            
            // 最终有效性检查：歌名不能为空
            if (!songName || songName.length === 0) {
                return { valid: false };
            }
            
            return {
                valid: true,
                id: id,
                name: songName,
                artist: artist,
                fullName: filename,
                ext: match[3]
            };
        }

        let allMVList = [];
        let filteredMVList = [];
        let currentKeyword = '';

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/&/g, '&amp;')
                      .replace(/</g, '&lt;')
                      .replace(/>/g, '&gt;')
                      .replace(/"/g, '&quot;')
                      .replace(/'/g, '&#39;');
        }

        function escapeRegex(str) {
            return str.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
        }

        function highlightText(text, keyword) {
            if (!keyword || !text) return escapeHtml(text);
            const regex = new RegExp(`(${escapeRegex(keyword)})`, 'gi');
            return escapeHtml(text).replace(regex, '<span class="highlight">$1</span>');
        }

        function renderMVList() {
            const container = document.getElementById('mvList');
            if (!filteredMVList || filteredMVList.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="icon">🎵</div>
                        <div>暂无匹配的MV</div>
                        <div style="font-size:0.75rem; margin-top:6px;">试试其他关键词吧</div>
                    </div>
                `;
                updateStats();
                return;
            }

            let itemsHtml = '';
            for (let item of filteredMVList) {
                let displayId = currentKeyword ? highlightText(item.id, currentKeyword) : escapeHtml(item.id);
                let displayName = currentKeyword ? highlightText(item.name, currentKeyword) : escapeHtml(item.name);
                let displayArtist = item.artist ? (currentKeyword ? highlightText(item.artist, currentKeyword) : escapeHtml(item.artist)) : '';
                const artistHtml = displayArtist ? `<span class="mv-artist">- ${displayArtist}</span>` : '';

                itemsHtml += `
                    <div class="mv-item" data-fullname="${escapeHtml(item.fullName)}" data-id="${escapeHtml(item.id)}" data-name="${escapeHtml(item.name)}" data-artist="${escapeHtml(item.artist)}">
                        <div class="mv-number">${displayId}</div>
                        <div class="mv-name">${displayName}${artistHtml}</div>
                        <div class="play-icon">▶️</div>
                    </div>
                `;
            }
            container.innerHTML = itemsHtml;

            document.querySelectorAll('.mv-item').forEach(el => {
                el.removeEventListener('click', mvClickHandler);
                el.addEventListener('click', mvClickHandler);
            });
            updateStats();
        }

        function mvClickHandler(e) {
            const target = e.currentTarget;
            const fullName = target.getAttribute('data-fullname') || '';
            const id = target.getAttribute('data-id') || '';
            const name = target.getAttribute('data-name') || '';
            const artist = target.getAttribute('data-artist') || '';
            playMV(fullName, id, name, artist);
        }

        function playMV(fullName, id, name, artist) {
            const artistText = artist ? ` - ${artist}` : '';
            alert(`🎬 播放MV\n\n📀 编号: ${id}\n🎤 歌曲: ${name}${artistText}\n📁 文件: ${fullName}`);
        }

        let searchTimeout = null;
        function searchMV(keyword) {
            if (searchTimeout) clearTimeout(searchTimeout);
            searchTimeout = setTimeout(() => {
                currentKeyword = keyword.trim();
                if (currentKeyword === '') {
                    filteredMVList = [...allMVList];
                } else {
                    const lowerKeyword = currentKeyword.toLowerCase();
                    filteredMVList = allMVList.filter(item =>
                        item.id.includes(lowerKeyword) ||
                        item.name.toLowerCase().includes(lowerKeyword) ||
                        (item.artist && item.artist.toLowerCase().includes(lowerKeyword)) ||
                        item.fullName.toLowerCase().includes(lowerKeyword)
                    );
                }
                renderMVList();
            }, 200);
        }

        function resetSearch() {
            document.getElementById('searchInput').value = '';
            currentKeyword = '';
            filteredMVList = [...allMVList];
            renderMVList();
        }

        function updateStats() {
            const totalSpan = document.getElementById('totalCount');
            totalSpan.innerHTML = `🎵 共 ${allMVList.length} 首MV`;
            const searchInfo = document.getElementById('searchInfo');
            if (currentKeyword && filteredMVList.length === 0) {
                searchInfo.innerHTML = '😔 没有找到匹配的MV，试试其他关键词';
                searchInfo.style.background = '#ffe6e6';
            } else if (currentKeyword) {
                searchInfo.innerHTML = `🔍 找到 ${filteredMVList.length} 个相关MV (共 ${allMVList.length} 首)`;
                searchInfo.style.background = '#e0f2e6';
            } else {
                searchInfo.innerHTML = '💡 输入MV名称、歌手名或编号进行搜索，支持模糊匹配';
                searchInfo.style.background = '#eef2ff';
            }
        }

        function updateOrientationDisplay() {
            const isLandscape = window.matchMedia("(orientation: landscape)").matches;
            const display = document.getElementById('orientationDisplay');
            if (isLandscape) {
                display.innerHTML = '🖥️ 横屏 · 多列网格';
                display.style.background = '#d4edda';
                display.style.color = '#155724';
            } else {
                display.innerHTML = '📱 竖屏 · 大卡片列表';
                display.style.background = '#e9ecef';
                display.style.color = '#495057';
            }
        }

        function initOrientationListener() {
            const handleResize = () => {
                updateOrientationDisplay();
                renderMVList();
            };
            window.addEventListener('resize', handleResize);
            window.addEventListener('orientationchange', () => {
                setTimeout(() => {
                    updateOrientationDisplay();
                    renderMVList();
                }, 50);
            });
        }

        function initSearchEvents() {
            const searchBtn = document.getElementById('searchBtn');
            const resetBtn = document.getElementById('resetBtn');
            const searchInput = document.getElementById('searchInput');
            searchBtn.addEventListener('click', () => searchMV(searchInput.value));
            resetBtn.addEventListener('click', () => resetSearch());
            searchInput.addEventListener('input', (e) => searchMV(e.target.value));
            searchInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') searchMV(searchInput.value);
            });
        }

        async function loadMVList() {
            const container = document.getElementById('mvList');
            container.innerHTML = '<div class="loading"><div class="icon">🎬</div><div>加载MV列表中...</div></div>';
            try {
                const text = await fetchAndDecode(TXT_FILE_URL);
                const rawList = text.split(/\r?\n/)
                    .map(line => line.trim())
                    .filter(line => line.length > 0 && !line.startsWith('#') && !line.startsWith('//'));

                if (rawList.length === 0) throw new Error('文件中没有有效数据');

                let parsed = [];
                for (let filename of rawList) {
                    const item = parseMVFileName(filename);
                    if (item.valid && item.id && item.name) {
                        parsed.push(item);
                    }
                }
                
                // 按编号排序
                parsed.sort((a, b) => (parseInt(a.id) || 0) - (parseInt(b.id) || 0));
                allMVList = parsed;
                filteredMVList = [...allMVList];
                renderMVList();
            } catch (error) {
                console.warn('⚠️ 加载外部文件失败，使用备用数据:', error);
                // 备用数据只包含有效条目
                const fallbackRaw = [
                    "00001.王杰-一场游戏一场梦.mp4", "00002.陈奕迅-十年.mp4", "00003.林俊杰-江南.mp4",
                    "00070.李建复-龙的传人.mp4", "00071.优客李林-少年游.mp4", "00072.张国荣-倩女幽魂.mp4",
                    "00077.苏小明-军港之夜.mp4", "00078.成龙-醉拳.mp4", "00079.李娜-好人一生平安.mp4"
                ];
                allMVList = fallbackRaw.map(filename => parseMVFileName(filename)).filter(item => item.valid);
                allMVList.sort((a, b) => (parseInt(a.id) || 0) - (parseInt(b.id) || 0));
                filteredMVList = [...allMVList];
                renderMVList();
            }
            updateOrientationDisplay();
        }

        async function init() {
            await loadMVList();
            initOrientationListener();
            initSearchEvents();
        }
        init();
    </script>
</body>

</html>
