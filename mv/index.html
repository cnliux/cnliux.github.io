<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
    <title>吕二哥MV音乐精选 - 热门优先 · 随机探索</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Roboto', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(145deg, #0b0c1a 0%, #12172f 100%);
            min-height: 100vh;
            padding: 0;
            margin: 0;
        }

        .container {
            max-width: 1600px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.96);
            border-radius: 0;
            padding: 8px 8px 0 8px;
            display: flex;
            flex-direction: column;
            height: 100vh;
            width: 100%;
            box-shadow: none;
        }

        .header {
            text-align: center;
            margin-bottom: 6px;
            flex-shrink: 0;
        }

        h1 {
            font-size: clamp(1.3rem, 4.5vw, 2rem);
            background: linear-gradient(125deg, #4f7df3 0%, #b345d6 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 2px;
            line-height: 1.3;
        }

        .subtitle {
            color: #5a6874;
            font-size: clamp(0.6rem, 2.8vw, 0.75rem);
            line-height: 1.2;
        }

        .stats-card {
            background: #f0f3fa;
            border-radius: 20px;
            padding: 6px 12px;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 6px;
            flex-shrink: 0;
        }

        .stats-info {
            display: flex;
            gap: 8px;
            align-items: center;
            flex-wrap: wrap;
        }

        .stat-badge {
            background: white;
            padding: 4px 12px;
            border-radius: 30px;
            font-size: 0.7rem;
            font-weight: 600;
            color: #4f7df3;
        }

        .orientation-badge {
            background: #e2e8f2;
            padding: 4px 10px;
            border-radius: 30px;
            font-size: 0.65rem;
            color: #2c3e50;
        }

        .search-info {
            font-size: 0.65rem;
            background: #eef2ff;
            padding: 4px 10px;
            border-radius: 30px;
        }

        .sort-bar {
            display: flex;
            gap: 10px;
            margin-bottom: 8px;
            flex-shrink: 0;
            background: #f8fafc;
            padding: 6px 12px;
            border-radius: 40px;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
        }

        .sort-buttons {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .sort-btn {
            background: white;
            border: 1px solid #cbd5e1;
            padding: 4px 12px;
            border-radius: 30px;
            font-size: 0.7rem;
            font-weight: 600;
            color: #334155;
            cursor: pointer;
            transition: all 0.1s ease;
        }

        .sort-btn.active {
            background: linear-gradient(110deg, #4f7df3 0%, #a158e0 100%);
            color: white;
            border-color: transparent;
        }

        .sort-btn.reset-rank {
            background: #f1f5f9;
            color: #475569;
        }

        .search-section {
            margin-bottom: 8px;
            flex-shrink: 0;
        }

        .search-box {
            display: flex;
            gap: 8px;
            width: 100%;
        }

        .search-input {
            flex: 1;
            padding: 8px 14px;
            border: 1.5px solid #e2e8f0;
            border-radius: 44px;
            font-size: 0.8rem;
            outline: none;
            background: white;
            min-width: 0;
        }

        .search-input:focus {
            border-color: #4f7df3;
            box-shadow: 0 0 0 2px rgba(79, 125, 243, 0.2);
        }

        .search-btn {
            padding: 8px 16px;
            background: linear-gradient(110deg, #4f7df3 0%, #a158e0 100%);
            color: white;
            border: none;
            border-radius: 44px;
            font-size: 0.75rem;
            font-weight: 600;
            cursor: pointer;
            white-space: nowrap;
        }

        .search-btn.reset {
            background: #6c7a8c;
        }

        .mv-list-container {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
            border-radius: 16px;
            min-height: 0;
            -webkit-overflow-scrolling: touch;
            margin-bottom: 6px;
        }

        @media (orientation: portrait) {
            .mv-list {
                display: flex;
                flex-direction: column;
                gap: 12px;
                padding-bottom: 8px;
            }

            .mv-item {
                background: white;
                border-radius: 20px;
                padding: 14px 16px;
                display: flex;
                align-items: center;
                gap: 14px;
                box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
                border: 1px solid #eef2ff;
                cursor: pointer;
                transition: all 0.1s ease;
            }

            .mv-item:active {
                background: #f5f7ff;
                transform: scale(0.99);
            }

            .mv-number {
                flex-shrink: 0;
                min-width: 80px;
                background: linear-gradient(135deg, #4f7df3, #9b51e0);
                padding: 10px 0;
                border-radius: 36px;
                text-align: center;
                font-weight: 800;
                font-size: 0.9rem;
                color: white;
                letter-spacing: 0.5px;
                box-shadow: 0 2px 6px rgba(0, 0, 0, 0.1);
            }

            .mv-name {
                flex: 1;
                font-weight: 700;
                font-size: 1rem;
                line-height: 1.4;
                word-break: break-word;
                white-space: normal;
                color: #111827;
            }

            .mv-artist {
                font-size: 0.8rem;
                font-weight: 600;
                color: #4f7df3;
                margin-left: 8px;
                display: inline-block;
            }

            .play-icon {
                font-size: 1.4rem;
                opacity: 0.6;
                flex-shrink: 0;
                margin-left: 6px;
            }

            .hot-badge {
                background: #ff6b6b;
                color: white;
                border-radius: 20px;
                padding: 2px 8px;
                font-size: 0.6rem;
                font-weight: bold;
                margin-left: 6px;
                display: inline-block;
                vertical-align: middle;
            }
        }

        @media (orientation: landscape) {
            .mv-list {
                display: grid;
                grid-template-columns: repeat(5, 1fr);
                gap: 14px;
                padding-bottom: 8px;
            }

            .mv-item {
                display: flex;
                flex-direction: column;
                align-items: center;
                text-align: center;
                padding: 16px 10px;
                background: white;
                border-radius: 20px;
                cursor: pointer;
                transition: all 0.1s;
                border: 1px solid #eef2ff;
                box-shadow: 0 2px 6px rgba(0, 0, 0, 0.05);
                position: relative;
            }

            .mv-item:active {
                background: #f0f3ff;
                transform: scale(0.98);
            }

            .mv-number {
                width: auto;
                padding: 6px 14px;
                margin-bottom: 12px;
                font-size: 0.8rem;
                font-weight: 800;
                background: linear-gradient(125deg, #4f7df3, #a853e6);
                border-radius: 36px;
                color: white;
                display: inline-block;
            }

            .mv-name {
                font-size: 0.88rem;
                font-weight: 700;
                word-break: break-word;
                max-width: 100%;
                line-height: 1.4;
                margin-bottom: 4px;
            }

            .mv-artist {
                display: block;
                font-size: 0.72rem;
                font-weight: 500;
                margin-top: 4px;
                color: #6c5ce7;
            }

            .play-icon {
                margin-top: 10px;
                opacity: 0.6;
                font-size: 1.1rem;
            }

            .hot-badge {
                position: absolute;
                top: 8px;
                right: 8px;
                background: #ff6b6b;
                color: white;
                border-radius: 20px;
                padding: 2px 6px;
                font-size: 0.6rem;
                font-weight: bold;
            }
        }

        @media (orientation: landscape) and (max-width: 1100px) {
            .mv-list { grid-template-columns: repeat(4, 1fr); gap: 12px; }
        }
        @media (orientation: landscape) and (max-width: 800px) {
            .mv-list { grid-template-columns: repeat(3, 1fr); gap: 10px; }
        }
        @media (orientation: landscape) and (max-width: 550px) {
            .mv-list { grid-template-columns: repeat(2, 1fr); }
        }

        .highlight {
            background: #fde047;
            color: #1e293b;
            padding: 2px 6px;
            border-radius: 12px;
            font-weight: 800;
            display: inline-block;
        }

        .mv-list-container::-webkit-scrollbar {
            width: 4px;
        }
        .mv-list-container::-webkit-scrollbar-track {
            background: #eef2ff;
            border-radius: 10px;
        }
        .mv-list-container::-webkit-scrollbar-thumb {
            background: #b9c3e9;
            border-radius: 10px;
        }

        .empty-state, .loading {
            text-align: center;
            padding: 48px 20px;
            background: #fef9e6;
            border-radius: 28px;
            color: #4b5563;
        }

        .loading .icon {
            font-size: 2.2rem;
            margin-bottom: 10px;
        }

        @media (max-width: 480px) and (orientation: portrait) {
            .container {
                padding: 6px 6px 0 6px;
            }
            .mv-item {
                padding: 12px 12px;
                gap: 10px;
            }
            .mv-number {
                min-width: 68px;
                font-size: 0.8rem;
                padding: 8px 0;
            }
            .mv-name {
                font-size: 0.9rem;
            }
            .mv-artist {
                font-size: 0.72rem;
            }
            .play-icon {
                font-size: 1.2rem;
            }
            .search-input {
                padding: 7px 12px;
                font-size: 0.75rem;
            }
            .search-btn {
                padding: 7px 12px;
                font-size: 0.7rem;
            }
            .sort-btn {
                padding: 3px 8px;
                font-size: 0.65rem;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="header">
            <h1>🎵 吕二哥MV音乐精选</h1>
            <div class="subtitle">🎬 00001-01302 MV曲库 · 🎙️ 01302-01336 连载歌曲</div>
            <div class="subtitle" style="font-size:0.6rem;">🌐 数据源: cnliux.github.io/mv/ | ⚡ 智能排序(热度+搜索+随机)</div>
        </div>

        <div class="stats-card">
            <div class="stats-info">
                <span class="stat-badge" id="totalCount">📀 加载中...</span>
                <span class="orientation-badge" id="orientationDisplay">📱 竖屏模式</span>
            </div>
            <div class="search-info" id="searchInfo">💡 搜索歌名/歌手/编号</div>
        </div>

        <div class="sort-bar">
            <div class="sort-buttons">
                <button class="sort-btn" data-sort="default">📌 编号排序</button>
                <button class="sort-btn active" data-sort="hot">🔥 热门优先(默认)</button>
                <button class="sort-btn" data-sort="random">🎲 随机排序</button>
                <button class="sort-btn reset-rank" id="resetRankBtn">🔄 重置点击记录</button>
            </div>
            <div style="font-size: 0.65rem; color:#5a6e8a;">⭐ 点击歌曲增加热度，随机模式每次刷新顺序</div>
        </div>

        <div class="search-section">
            <div class="search-box">
                <input type="text" id="searchInput" class="search-input" placeholder="🔍 搜索 MV 名称、歌手或编号..." autocomplete="off">
                <button id="searchBtn" class="search-btn">搜索</button>
                <button id="resetBtn" class="search-btn reset">重置</button>
            </div>
        </div>

        <div class="mv-list-container" id="mvListContainer">
            <div id="mvList" class="mv-list">
                <div class="loading">
                    <div class="icon">🎶</div>
                    <div>正在加载MV列表...</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ---------- 核心数据 ----------
        const TXT_FILE_URL = 'https://cnliux.github.io/mv/list.txt';
        let allMVList = [];           // 原始数据 { id, name, artist, fullName, ext, clickCount }
        let filteredMVList = [];       // 当前过滤+排序后的列表
        let currentKeyword = '';
        let currentSortMode = 'hot';   // 默认改为 'hot' (热门优先)
        
        // 持久化点击次数 (localStorage)
        const STORAGE_KEY = 'mv_click_counts_v2';
        let clickMap = new Map();       // key: songKey (id+name+artist 组合保证唯一) 存储点击次数
        
        // 随机种子缓存: 为了保证同一轮随机排序内不变化，每次点击随机模式时生成一次随机顺序映射
        let randomOrderCache = [];      // 存储当前随机模式下的id顺序 (按原始allMVList索引排序?)
        
        // ---------- 辅助函数 ----------
        function getSongUniqueKey(item) {
            return `${item.id}|${item.name}|${item.artist || ''}`;
        }
        
        // 加载点击次数
        function loadClickCounts() {
            try {
                const stored = localStorage.getItem(STORAGE_KEY);
                if (stored) {
                    const parsed = JSON.parse(stored);
                    clickMap = new Map(Object.entries(parsed));
                } else {
                    clickMap = new Map();
                }
            } catch(e) { clickMap = new Map(); }
        }
        
        // 保存点击次数
        function saveClickCounts() {
            try {
                const obj = Object.fromEntries(clickMap);
                localStorage.setItem(STORAGE_KEY, JSON.stringify(obj));
            } catch(e) {}
        }
        
        // 增加点击次数
        function incrementClickCount(item) {
            const key = getSongUniqueKey(item);
            const current = clickMap.get(key) || 0;
            clickMap.set(key, current + 1);
            saveClickCounts();
            updateClickCountInAllList();
        }
        
        // 将clickMap数据同步到allMVList
        function updateClickCountInAllList() {
            for (let mv of allMVList) {
                const key = getSongUniqueKey(mv);
                mv.clickCount = clickMap.get(key) || 0;
            }
        }
        
        // 重置所有点击记录
        function resetAllClickCounts() {
            clickMap.clear();
            saveClickCounts();
            updateClickCountInAllList();
            applyFilterAndSort();
        }
        
        // 计算搜索加权分数 (热门模式中使用)
        function getSearchBoost(item, keyword) {
            if (!keyword) return 0;
            const lowerKw = keyword.toLowerCase();
            let matchScore = 0;
            if (item.id === lowerKw) matchScore = 1.2;
            else if (item.name.toLowerCase() === lowerKw) matchScore = 1.0;
            else if (item.name.toLowerCase().includes(lowerKw)) matchScore = 0.6;
            else if (item.artist && item.artist.toLowerCase().includes(lowerKw)) matchScore = 0.5;
            else if (item.fullName.toLowerCase().includes(lowerKw)) matchScore = 0.3;
            else if (item.id.includes(lowerKw)) matchScore = 0.4;
            else matchScore = 0;
            return matchScore;
        }
        
        // 热门得分算法 (点击次数 * (1 + 匹配因子*2) )
        function getHotScore(item, keyword) {
            const baseClicks = item.clickCount || 0;
            let boost = 0;
            if (keyword) {
                boost = getSearchBoost(item, keyword);
                const multiplier = 1 + (boost * 1.8);
                return baseClicks * multiplier;
            }
            return baseClicks;
        }
        
        // 生成新的随机顺序 (基于传入的列表，不改变原数组)
        function shuffleArray(arr) {
            const shuffled = [...arr];
            for (let i = shuffled.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
            }
            return shuffled;
        }
        
        // 排序核心 (扩展支持随机)
        function sortMVList(list, keyword, sortMode) {
            if (sortMode === 'hot') {
                return [...list].sort((a, b) => {
                    const scoreA = getHotScore(a, keyword);
                    const scoreB = getHotScore(b, keyword);
                    if (scoreA !== scoreB) return scoreB - scoreA;
                    return (parseInt(a.id) || 0) - (parseInt(b.id) || 0);
                });
            } else if (sortMode === 'random') {
                // 随机排序: 基于当前列表的副本直接打乱顺序，保证每次重新调用都会生成全新随机序列(包括搜索过滤后的随机)
                // 为了避免因重复调用造成顺序重置过于频繁但符合预期: 每次排序都重新shuffle
                return shuffleArray(list);
            } else {
                // 默认编号排序
                return [...list].sort((a, b) => (parseInt(a.id) || 0) - (parseInt(b.id) || 0));
            }
        }
        
        // 全局应用过滤 + 排序并渲染
        function applyFilterAndSort() {
            let workingList = [...allMVList];
            if (currentKeyword && currentKeyword.trim() !== '') {
                const lowerKeyword = currentKeyword.toLowerCase().trim();
                workingList = workingList.filter(item =>
                    item.id.includes(lowerKeyword) ||
                    item.name.toLowerCase().includes(lowerKeyword) ||
                    (item.artist && item.artist.toLowerCase().includes(lowerKeyword)) ||
                    item.fullName.toLowerCase().includes(lowerKeyword)
                );
            }
            // 关键: 根据当前排序模式执行排序 (随机每次生成全新乱序)
            filteredMVList = sortMVList(workingList, currentKeyword, currentSortMode);
            renderMVList();
        }
        
        // 重新随机(强制刷新随机顺序) 供随机模式使用，不改变其他
        function reshuffleRandom() {
            if (currentSortMode === 'random') {
                applyFilterAndSort();
            }
        }
        
        // ----- 网络请求与解析 -----
        async function fetchAndDecode(url) {
            const response = await fetch(url);
            const buffer = await response.arrayBuffer();
            const bytes = new Uint8Array(buffer);
            if (bytes.length >= 3 && bytes[0] === 0xEF && bytes[1] === 0xBB && bytes[2] === 0xBF) {
                const decoder = new TextDecoder('utf-8');
                return decoder.decode(buffer.slice(3));
            }
            const utf8Decoder = new TextDecoder('utf-8');
            let utf8Text = utf8Decoder.decode(buffer);
            if (utf8Text.includes('�') || (!utf8Text.match(/[\u4e00-\u9fa5]/) && utf8Text.length > 10)) {
                try {
                    const gbkDecoder = new TextDecoder('gb18030');
                    const gbkText = gbkDecoder.decode(buffer);
                    if (gbkText.match(/[\u4e00-\u9fa5]/)) return gbkText;
                } catch(e) {}
                try {
                    const big5Decoder = new TextDecoder('big5');
                    const big5Text = big5Decoder.decode(buffer);
                    if (big5Text.match(/[\u4e00-\u9fa5]/)) return big5Text;
                } catch(e) {}
            } else if (utf8Text.match(/[\u4e00-\u9fa5]/)) {
                return utf8Text;
            }
            return utf8Text;
        }
        
        function parseMVFileName(filename) {
            const match = filename.match(/^(\d+)\.(.+?)\.(mp4|mp3|mkv|webm|flv|mov|avi)$/i);
            if (!match) return { valid: false };
            const id = match[1];
            let namePart = match[2];
            if (!namePart || namePart.trim().length === 0) return { valid: false };
            if (/^\d+$/.test(namePart.trim())) return { valid: false };
            let songName = namePart;
            let artist = '';
            if (namePart.includes('-')) {
                const parts = namePart.split('-');
                if (parts.length >= 2) {
                    artist = parts[0].trim();
                    songName = parts[1].trim();
                    if (songName.length < 2 && artist.length > 2) {
                        let tmp = songName;
                        songName = artist;
                        artist = tmp;
                    }
                }
            } else if (namePart.includes('_')) {
                const parts = namePart.split('_');
                artist = parts[0].trim();
                songName = parts[1] ? parts[1].trim() : parts[0].trim();
            }
            songName = songName.replace(/\[.*?\]|\(.*?\)/g, '').trim();
            artist = artist.replace(/\[.*?\]|\(.*?\)/g, '').trim();
            if (!songName || songName.length === 0) return { valid: false };
            return {
                valid: true,
                id: id,
                name: songName,
                artist: artist,
                fullName: filename,
                ext: match[3],
                clickCount: 0
            };
        }
        
        // 备用数据
        function getFallbackList() {
            const fallbackRaw = [
                "00001.王杰-一场游戏一场梦.mp4", "00002.陈奕迅-十年.mp4", "00003.林俊杰-江南.mp4",
                "00070.李建复-龙的传人.mp4", "00071.优客李林-少年游.mp4", "00072.张国荣-倩女幽魂.mp4",
                "00077.苏小明-军港之夜.mp4", "00078.成龙-醉拳.mp4", "00079.李娜-好人一生平安.mp4",
                "00123.周杰伦-晴天.mp4", "00456.邓丽君-甜蜜蜜.mp4", "00789.Beyond-海阔天空.mp4",
                "00888.刘德华-冰雨.mp4", "00999.张雨生-大海.mp4"
            ];
            return fallbackRaw.map(filename => parseMVFileName(filename)).filter(item => item.valid);
        }
        
        // ----- UI 渲染与高亮 -----
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/&/g, '&amp;')
                      .replace(/</g, '&lt;')
                      .replace(/>/g, '&gt;')
                      .replace(/"/g, '&quot;')
                      .replace(/'/g, '&#39;');
        }
        
        function escapeRegex(str) {
            return str.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
        }
        
        function highlightText(text, keyword) {
            if (!keyword || !text) return escapeHtml(text);
            const regex = new RegExp(`(${escapeRegex(keyword)})`, 'gi');
            return escapeHtml(text).replace(regex, '<span class="highlight">$1</span>');
        }
        
        function renderMVList() {
            const container = document.getElementById('mvList');
            if (!filteredMVList.length) {
                container.innerHTML = `<div class="empty-state"><div class="icon">🎵</div><div>暂无匹配的MV</div><div style="font-size:0.75rem; margin-top:6px;">试试其他关键词吧</div></div>`;
                updateStats();
                return;
            }
            
            let itemsHtml = '';
            for (let item of filteredMVList) {
                const displayId = currentKeyword ? highlightText(item.id, currentKeyword) : escapeHtml(item.id);
                const displayName = currentKeyword ? highlightText(item.name, currentKeyword) : escapeHtml(item.name);
                const displayArtist = item.artist ? (currentKeyword ? highlightText(item.artist, currentKeyword) : escapeHtml(item.artist)) : '';
                const artistHtml = displayArtist ? `<span class="mv-artist">- ${displayArtist}</span>` : '';
                const clickCount = item.clickCount || 0;
                const hotBadge = clickCount > 0 ? `<span class="hot-badge">🔥 ${clickCount}</span>` : '';
                
                itemsHtml += `
                    <div class="mv-item" data-fullname="${escapeHtml(item.fullName)}" data-id="${escapeHtml(item.id)}" data-name="${escapeHtml(item.name)}" data-artist="${escapeHtml(item.artist)}" data-unique="${escapeHtml(getSongUniqueKey(item))}">
                        <div class="mv-number">${displayId}</div>
                        <div class="mv-name">${displayName}${artistHtml}${hotBadge}</div>
                        <div class="play-icon">▶️</div>
                    </div>
                `;
            }
            container.innerHTML = itemsHtml;
            
            document.querySelectorAll('.mv-item').forEach(el => {
                el.removeEventListener('click', mvClickHandler);
                el.addEventListener('click', mvClickHandler);
            });
            updateStats();
        }
        
        function mvClickHandler(e) {
            const target = e.currentTarget;
            const fullName = target.getAttribute('data-fullname') || '';
            const id = target.getAttribute('data-id') || '';
            const name = target.getAttribute('data-name') || '';
            const artist = target.getAttribute('data-artist') || '';
            const mvItem = allMVList.find(item => item.fullName === fullName && item.id === id);
            if (mvItem) {
                incrementClickCount(mvItem);
                // 点击后热度变更，如果当前是热门模式需要刷新排序；随机模式不改变随机顺序但保留热度显示，但也要刷新使热度数值更新
                applyFilterAndSort();
            }
            const artistText = artist ? ` - ${artist}` : '';
            alert(`🎬 播放MV\n\n📀 编号: ${id}\n🎤 歌曲: ${name}${artistText}\n📁 文件: ${fullName}\n👍 感谢支持，热度 +1`);
        }
        
        function updateStats() {
            const totalSpan = document.getElementById('totalCount');
            const totalClicks = Array.from(clickMap.values()).reduce((a,b)=>a+b,0);
            totalSpan.innerHTML = `🎵 共 ${allMVList.length} 首MV | 🔥 总点击: ${totalClicks}`;
            const searchInfo = document.getElementById('searchInfo');
            if (currentKeyword && filteredMVList.length === 0) {
                searchInfo.innerHTML = '😔 没有找到匹配的MV，试试其他关键词';
                searchInfo.style.background = '#ffe6e6';
            } else if (currentKeyword) {
                searchInfo.innerHTML = `🔍 找到 ${filteredMVList.length} 个相关MV (共 ${allMVList.length} 首) | 排序: ${currentSortMode === 'hot' ? '🔥热门优先' : (currentSortMode === 'random' ? '🎲随机模式' : '📌编号')}`;
                searchInfo.style.background = '#e0f2e6';
            } else {
                searchInfo.innerHTML = `💡 输入MV名称、歌手名或编号搜索 | 当前排序: ${currentSortMode === 'hot' ? '热门优先(点击量)' : (currentSortMode === 'random' ? '随机排序(每次刷新)' : '编号排序')}`;
                searchInfo.style.background = '#eef2ff';
            }
        }
        
        function updateOrientationDisplay() {
            const isLandscape = window.matchMedia("(orientation: landscape)").matches;
            const display = document.getElementById('orientationDisplay');
            if (isLandscape) {
                display.innerHTML = '🖥️ 横屏 · 多列网格';
                display.style.background = '#d4edda';
                display.style.color = '#155724';
            } else {
                display.innerHTML = '📱 竖屏 · 大卡片列表';
                display.style.background = '#e9ecef';
                display.style.color = '#495057';
            }
        }
        
        function resetSearch() {
            document.getElementById('searchInput').value = '';
            currentKeyword = '';
            applyFilterAndSort();
        }
        
        function searchMV(keyword) {
            currentKeyword = keyword.trim();
            applyFilterAndSort();
        }
        
        function setSortMode(mode) {
            if (mode === currentSortMode) return;
            currentSortMode = mode;
            document.querySelectorAll('.sort-btn').forEach(btn => {
                const btnMode = btn.getAttribute('data-sort');
                if (btnMode === mode) btn.classList.add('active');
                else btn.classList.remove('active');
            });
            // 切换排序后，重新应用排序（随机模式会立刻生成新的随机序列）
            applyFilterAndSort();
        }
        
        // 加载主数据
        async function loadMVList() {
            const container = document.getElementById('mvList');
            container.innerHTML = '<div class="loading"><div class="icon">🎬</div><div>加载MV列表中...</div></div>';
            try {
                const text = await fetchAndDecode(TXT_FILE_URL);
                const rawList = text.split(/\r?\n/).map(line=>line.trim()).filter(line=>line.length && !line.startsWith('#') && !line.startsWith('//'));
                if (rawList.length === 0) throw new Error('无数据');
                let parsed = [];
                for(let filename of rawList) {
                    const item = parseMVFileName(filename);
                    if(item.valid && item.id && item.name) parsed.push(item);
                }
                if(parsed.length === 0) throw new Error('解析无有效条目');
                allMVList = parsed;
            } catch(e) {
                console.warn("使用备用数据", e);
                allMVList = getFallbackList();
            }
            allMVList.sort((a,b)=>(parseInt(a.id)||0)-(parseInt(b.id)||0));
            loadClickCounts();
            updateClickCountInAllList();
            // 默认热门模式，应用排序
            applyFilterAndSort();
            updateOrientationDisplay();
        }
        
        function initSortButtons() {
            const defaultBtn = document.querySelector('.sort-btn[data-sort="default"]');
            const hotBtn = document.querySelector('.sort-btn[data-sort="hot"]');
            const randomBtn = document.querySelector('.sort-btn[data-sort="random"]');
            if(defaultBtn) defaultBtn.addEventListener('click', () => setSortMode('default'));
            if(hotBtn) hotBtn.addEventListener('click', () => setSortMode('hot'));
            if(randomBtn) randomBtn.addEventListener('click', () => setSortMode('random'));
            const resetRankBtn = document.getElementById('resetRankBtn');
            if(resetRankBtn) {
                resetRankBtn.addEventListener('click', () => {
                    if(confirm('重置所有MV的点击热度记录？数据将清空。')) {
                        resetAllClickCounts();
                    }
                });
            }
        }
        
        function initSearchEvents() {
            const searchBtn = document.getElementById('searchBtn');
            const resetBtn = document.getElementById('resetBtn');
            const searchInput = document.getElementById('searchInput');
            searchBtn.addEventListener('click', () => searchMV(searchInput.value));
            resetBtn.addEventListener('click', () => resetSearch());
            searchInput.addEventListener('input', (e) => searchMV(e.target.value));
            searchInput.addEventListener('keypress', (e) => { if(e.key === 'Enter') searchMV(searchInput.value); });
        }
        
        function initOrientationListener() {
            window.addEventListener('resize', () => { updateOrientationDisplay(); renderMVList(); });
            window.addEventListener('orientationchange', () => setTimeout(()=>{ updateOrientationDisplay(); renderMVList(); }, 50));
        }
        
        async function init() {
            await loadMVList();
            initSortButtons();
            initSearchEvents();
            initOrientationListener();
        }
        init();
        <script async src="https://186317.xyz/tj/stats.js"></script>
</body>

</html>
