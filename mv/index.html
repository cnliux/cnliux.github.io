<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
    <title>MV音乐精选 · 智能排序</title>
    <style>
        /* ---------- 全局重置 ---------- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Roboto', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(145deg, #0b0c1a 0%, #12172f 100%);
            min-height: 100vh;
            padding: 0;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 1600px;
            height: 100vh;
            background: rgba(255, 255, 255, 0.97);
            padding: 8px 10px 0 10px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 8px 40px rgba(0, 0, 0, 0.5);
            overflow: hidden;
        }

        /* ---------- 头部 ---------- */
        .header {
            text-align: center;
            flex-shrink: 0;
            padding-bottom: 4px;
        }

        h1 {
            font-size: clamp(1.2rem, 4vw, 2rem);
            background: linear-gradient(125deg, #4f7df3 0%, #b345d6 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            line-height: 1.3;
            letter-spacing: 0.5px;
        }

        .subtitle {
            color: #5a6874;
            font-size: clamp(0.55rem, 2.5vw, 0.7rem);
            line-height: 1.3;
        }

        /* ---------- 统计卡片 ---------- */
        .stats-card {
            background: #f0f3fa;
            border-radius: 18px;
            padding: 6px 14px;
            margin-bottom: 6px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 4px 10px;
            flex-shrink: 0;
        }

        .stats-info {
            display: flex;
            gap: 8px;
            align-items: center;
            flex-wrap: wrap;
        }

        .stat-badge {
            background: white;
            padding: 3px 14px;
            border-radius: 30px;
            font-size: 0.7rem;
            font-weight: 600;
            color: #4f7df3;
            white-space: nowrap;
        }

        .orientation-badge {
            background: #e2e8f2;
            padding: 3px 12px;
            border-radius: 30px;
            font-size: 0.6rem;
            color: #2c3e50;
            white-space: nowrap;
        }

        .search-info {
            font-size: 0.6rem;
            background: #eef2ff;
            padding: 3px 12px;
            border-radius: 30px;
            white-space: nowrap;
            transition: background 0.2s;
        }

        /* ---------- 排序栏 ---------- */
        .sort-bar {
            display: flex;
            gap: 8px;
            flex-shrink: 0;
            background: #f8fafc;
            padding: 4px 12px;
            border-radius: 40px;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            margin-bottom: 6px;
        }

        .sort-buttons {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }

        .sort-btn {
            background: white;
            border: 1px solid #cbd5e1;
            padding: 4px 14px;
            border-radius: 30px;
            font-size: 0.7rem;
            font-weight: 600;
            color: #334155;
            cursor: pointer;
            transition: all 0.15s ease;
            user-select: none;
        }

        .sort-btn:hover {
            background: #eef2ff;
        }

        .sort-btn.active {
            background: linear-gradient(110deg, #4f7df3 0%, #a158e0 100%);
            color: white;
            border-color: transparent;
            box-shadow: 0 2px 8px rgba(79, 125, 243, 0.3);
        }

        .sort-btn.reset-rank {
            background: #f1f5f9;
            color: #475569;
        }
        .sort-btn.reset-rank:hover {
            background: #fee2e2;
            color: #b91c1c;
        }

        .sort-hint {
            font-size: 0.6rem;
            color: #6c7a8c;
            white-space: nowrap;
        }

        /* ---------- 搜索栏 ---------- */
        .search-section {
            flex-shrink: 0;
            margin-bottom: 6px;
        }

        .search-box {
            display: flex;
            gap: 8px;
            width: 100%;
        }

        .search-input {
            flex: 1;
            padding: 8px 16px;
            border: 1.5px solid #e2e8f0;
            border-radius: 44px;
            font-size: 0.8rem;
            outline: none;
            background: white;
            min-width: 0;
            transition: border 0.2s, box-shadow 0.2s;
        }

        .search-input:focus {
            border-color: #4f7df3;
            box-shadow: 0 0 0 3px rgba(79, 125, 243, 0.15);
        }

        .search-btn {
            padding: 8px 18px;
            background: linear-gradient(110deg, #4f7df3 0%, #a158e0 100%);
            color: white;
            border: none;
            border-radius: 44px;
            font-size: 0.75rem;
            font-weight: 600;
            cursor: pointer;
            white-space: nowrap;
            transition: opacity 0.15s;
        }
        .search-btn:hover {
            opacity: 0.9;
        }

        .search-btn.reset {
            background: #6c7a8c;
        }
        .search-btn.reset:hover {
            background: #5a6874;
        }

        /* ---------- MV列表容器 ---------- */
        .mv-list-container {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
            border-radius: 16px;
            min-height: 0;
            -webkit-overflow-scrolling: touch;
            margin-bottom: 4px;
            padding-right: 2px;
        }

        .mv-list-container::-webkit-scrollbar {
            width: 4px;
        }
        .mv-list-container::-webkit-scrollbar-track {
            background: #eef2ff;
            border-radius: 10px;
        }
        .mv-list-container::-webkit-scrollbar-thumb {
            background: #b9c3e9;
            border-radius: 10px;
        }

        /* ---------- MV列表：竖屏 ---------- */
        @media (orientation: portrait) {
            .mv-list {
                display: flex;
                flex-direction: column;
                gap: 10px;
                padding-bottom: 8px;
            }

            .mv-item {
                background: white;
                border-radius: 20px;
                padding: 14px 18px;
                display: flex;
                align-items: center;
                gap: 14px;
                box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
                border: 1px solid #eef2ff;
                cursor: pointer;
                transition: all 0.1s ease;
            }
            .mv-item:active {
                background: #f5f7ff;
                transform: scale(0.99);
            }

            .mv-number {
                flex-shrink: 0;
                min-width: 76px;
                background: linear-gradient(135deg, #4f7df3, #9b51e0);
                padding: 10px 0;
                border-radius: 36px;
                text-align: center;
                font-weight: 800;
                font-size: 0.85rem;
                color: white;
                letter-spacing: 0.5px;
                box-shadow: 0 2px 6px rgba(0, 0, 0, 0.08);
            }

            .mv-name {
                flex: 1;
                font-weight: 700;
                font-size: 0.98rem;
                line-height: 1.4;
                word-break: break-word;
                color: #111827;
            }

            .mv-artist {
                font-size: 0.78rem;
                font-weight: 600;
                color: #4f7df3;
                margin-left: 6px;
                display: inline-block;
            }

            .play-icon {
                font-size: 1.3rem;
                opacity: 0.5;
                flex-shrink: 0;
                margin-left: 4px;
            }

            .hot-badge {
                background: #ff6b6b;
                color: white;
                border-radius: 20px;
                padding: 2px 8px;
                font-size: 0.6rem;
                font-weight: bold;
                margin-left: 6px;
                display: inline-block;
                vertical-align: middle;
            }
        }

        /* ---------- MV列表：横屏（网格） ---------- */
        @media (orientation: landscape) {
            .mv-list {
                display: grid;
                grid-template-columns: repeat(5, 1fr);
                gap: 14px;
                padding-bottom: 8px;
            }

            .mv-item {
                display: flex;
                flex-direction: column;
                align-items: center;
                text-align: center;
                padding: 16px 10px;
                background: white;
                border-radius: 20px;
                cursor: pointer;
                transition: all 0.1s;
                border: 1px solid #eef2ff;
                box-shadow: 0 2px 6px rgba(0, 0, 0, 0.05);
                position: relative;
            }
            .mv-item:active {
                background: #f0f3ff;
                transform: scale(0.98);
            }

            .mv-number {
                width: auto;
                padding: 6px 14px;
                margin-bottom: 12px;
                font-size: 0.8rem;
                font-weight: 800;
                background: linear-gradient(125deg, #4f7df3, #a853e6);
                border-radius: 36px;
                color: white;
                display: inline-block;
            }

            .mv-name {
                font-size: 0.88rem;
                font-weight: 700;
                word-break: break-word;
                max-width: 100%;
                line-height: 1.4;
                margin-bottom: 4px;
            }

            .mv-artist {
                display: block;
                font-size: 0.72rem;
                font-weight: 500;
                margin-top: 4px;
                color: #6c5ce7;
            }

            .play-icon {
                margin-top: 10px;
                opacity: 0.6;
                font-size: 1.1rem;
            }

            .hot-badge {
                position: absolute;
                top: 8px;
                right: 8px;
                background: #ff6b6b;
                color: white;
                border-radius: 20px;
                padding: 2px 6px;
                font-size: 0.6rem;
                font-weight: bold;
            }
        }

        @media (orientation: landscape) and (max-width: 1100px) {
            .mv-list { grid-template-columns: repeat(4, 1fr); gap: 12px; }
        }
        @media (orientation: landscape) and (max-width: 800px) {
            .mv-list { grid-template-columns: repeat(3, 1fr); gap: 10px; }
        }
        @media (orientation: landscape) and (max-width: 550px) {
            .mv-list { grid-template-columns: repeat(2, 1fr); }
        }

        .highlight {
            background: #fde047;
            color: #1e293b;
            padding: 2px 6px;
            border-radius: 12px;
            font-weight: 800;
            display: inline-block;
        }

        .empty-state,
        .loading {
            text-align: center;
            padding: 48px 20px;
            background: #fef9e6;
            border-radius: 28px;
            color: #4b5563;
        }

        .loading .icon {
            font-size: 2.2rem;
            margin-bottom: 10px;
        }

        @media (max-width: 480px) and (orientation: portrait) {
            .container { padding: 6px 6px 0 6px; }
            .mv-item { padding: 12px 12px; gap: 10px; }
            .mv-number { min-width: 68px; font-size: 0.8rem; padding: 8px 0; }
            .mv-name { font-size: 0.9rem; }
            .mv-artist { font-size: 0.72rem; }
            .play-icon { font-size: 1.2rem; }
            .search-input { padding: 7px 12px; font-size: 0.75rem; }
            .search-btn { padding: 7px 12px; font-size: 0.7rem; }
            .sort-btn { padding: 3px 8px; font-size: 0.65rem; }
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="header">
            <h1>🎵 MV音乐精选</h1>
            <div class="subtitle">🎬 00001-00035 连载歌曲 · 🎙️ 00036-01359 MV歌曲</div>
            <div class="subtitle" style="font-size:0.6rem;">🌐 数据源: cnliux.github.io/mv/ | ⚡ 智能排序(热度+搜索+随机)</div>
        </div>

        <div class="stats-card">
            <div class="stats-info">
                <span class="stat-badge" id="totalCount">📀 加载中...</span>
                <span class="orientation-badge" id="orientationDisplay">📱 竖屏模式</span>
            </div>
            <div class="search-info" id="searchInfo">💡 搜索歌名/歌手/编号</div>
        </div>

        <div class="sort-bar">
            <div class="sort-buttons">
                <button class="sort-btn" data-sort="default">📌 编号排序</button>
                <button class="sort-btn active" data-sort="hot">🔥 热门优先(默认)</button>
                <button class="sort-btn" data-sort="random">🎲 随机排序</button>
                <button class="sort-btn reset-rank" id="resetRankBtn">🔄 重置点击记录</button>
            </div>
            <div style="font-size: 0.65rem; color:#5a6e8a;">⭐ 点击歌曲增加热度，随机模式每次刷新顺序</div>
        </div>

        <div class="search-section">
            <div class="search-box">
                <input type="text" id="searchInput" class="search-input" placeholder="🔍 搜索 MV 名称、歌手或编号..." autocomplete="off">
                <button id="searchBtn" class="search-btn">搜索</button>
                <button id="resetBtn" class="search-btn reset">重置</button>
            </div>
        </div>

        <div class="mv-list-container" id="mvListContainer">
            <div id="mvList" class="mv-list">
                <div class="loading">
                    <div class="icon">🎶</div>
                    <div>正在加载MV列表...</div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://186317.xyz/tj/stats.js"></script>

    <script>
        // ---------- 核心数据 ----------
        var TXT_FILE_URLS = [
            'https://ghfast.top/https://raw.githubusercontent.com/cnliux/cnliux.github.io/main/mv/list.txt',
            'https://g.blfrp.cn/https://raw.githubusercontent.com/cnliux/cnliux.github.io/main/mv/list.txt',
            'https://cdn.gh-proxy.org/https://raw.githubusercontent.com/cnliux/cnliux.github.io/main/mv/list.txt',
            'https://raw.githubusercontent.com/cnliux/cnliux.github.io/main/mv/list.txt',
            'https://cdn.jsdelivr.net/gh/cnliux/cnliux.github.io@main/mv/list.txt'
        ];

        var allMVList = [];
        var filteredMVList = [];
        var currentKeyword = '';
        var currentSortMode = 'hot';

        var STORAGE_KEY = 'mv_click_counts_v2';
        var clickMap = new Map();

        // ---------- 点击计数辅助 ----------
        function getSongUniqueKey(item) {
            return item.id + '|' + item.name + '|' + (item.artist || '');
        }

        function loadClickCounts() {
            try {
                var stored = localStorage.getItem(STORAGE_KEY);
                if (stored) {
                    var parsed = JSON.parse(stored);
                    clickMap = new Map(Object.entries(parsed));
                } else {
                    clickMap = new Map();
                }
            } catch (e) { clickMap = new Map(); }
        }

        function saveClickCounts() {
            try {
                var obj = Object.fromEntries(clickMap);
                localStorage.setItem(STORAGE_KEY, JSON.stringify(obj));
            } catch (e) {}
        }

        function incrementClickCount(item) {
            var key = getSongUniqueKey(item);
            var current = clickMap.get(key) || 0;
            clickMap.set(key, current + 1);
            saveClickCounts();
            updateClickCountInAllList();
        }

        function updateClickCountInAllList() {
            for (var i = 0; i < allMVList.length; i++) {
                var mv = allMVList[i];
                var key = getSongUniqueKey(mv);
                mv.clickCount = clickMap.get(key) || 0;
            }
        }

        function resetAllClickCounts() {
            clickMap.clear();
            saveClickCounts();
            updateClickCountInAllList();
            applyFilterAndSort();
        }

        // ---------- 搜索/排序辅助 ----------
        function getSearchBoost(item, keyword) {
            if (!keyword) return 0;
            var lowerKw = keyword.toLowerCase();
            var matchScore = 0;
            if (item.id === lowerKw) matchScore = 1.2;
            else if (item.name.toLowerCase() === lowerKw) matchScore = 1.0;
            else if (item.name.toLowerCase().indexOf(lowerKw) !== -1) matchScore = 0.6;
            else if (item.artist && item.artist.toLowerCase().indexOf(lowerKw) !== -1) matchScore = 0.5;
            else if (item.fullName.toLowerCase().indexOf(lowerKw) !== -1) matchScore = 0.3;
            else if (item.id.indexOf(lowerKw) !== -1) matchScore = 0.4;
            else matchScore = 0;
            return matchScore;
        }

        function getHotScore(item, keyword) {
            var baseClicks = item.clickCount || 0;
            var boost = 0;
            if (keyword) {
                boost = getSearchBoost(item, keyword);
                var multiplier = 1 + (boost * 1.8);
                return baseClicks * multiplier;
            }
            return baseClicks;
        }

        function shuffleArray(arr) {
            var shuffled = arr.slice();
            for (var i = shuffled.length - 1; i > 0; i--) {
                var j = Math.floor(Math.random() * (i + 1));
                var temp = shuffled[i];
                shuffled[i] = shuffled[j];
                shuffled[j] = temp;
            }
            return shuffled;
        }

        function sortMVList(list, keyword, sortMode) {
            if (sortMode === 'hot') {
                var sorted = list.slice();
                sorted.sort(function(a, b) {
                    var scoreA = getHotScore(a, keyword);
                    var scoreB = getHotScore(b, keyword);
                    if (scoreA !== scoreB) return scoreB - scoreA;
                    return (parseInt(a.id) || 0) - (parseInt(b.id) || 0);
                });
                return sorted;
            } else if (sortMode === 'random') {
                return shuffleArray(list);
            } else {
                var sortedDefault = list.slice();
                sortedDefault.sort(function(a, b) {
                    return (parseInt(a.id) || 0) - (parseInt(b.id) || 0);
                });
                return sortedDefault;
            }
        }

        function applyFilterAndSort() {
            var workingList = allMVList.slice();
            if (currentKeyword && currentKeyword.trim() !== '') {
                var lowerKeyword = currentKeyword.toLowerCase().trim();
                workingList = workingList.filter(function(item) {
                    return item.id.indexOf(lowerKeyword) !== -1 ||
                        item.name.toLowerCase().indexOf(lowerKeyword) !== -1 ||
                        (item.artist && item.artist.toLowerCase().indexOf(lowerKeyword) !== -1) ||
                        item.fullName.toLowerCase().indexOf(lowerKeyword) !== -1;
                });
            }
            filteredMVList = sortMVList(workingList, currentKeyword, currentSortMode);
            renderMVList();
        }

        // ---------- 网络请求 (并行竞速 + 缓存) ----------
        async function fetchWithUTF8(url) {
            var response = await fetch(url);
            var buffer = await response.arrayBuffer();
            var bytes = new Uint8Array(buffer);

            var startOffset = 0;
            if (bytes.length >= 3 && bytes[0] === 0xEF && bytes[1] === 0xBB && bytes[2] === 0xBF) {
                startOffset = 3;
            }

            var decoder = new TextDecoder('utf-8');
            var text = decoder.decode(buffer.slice(startOffset));
            return text;
        }

        // ---------- 新的 fetchWithFallback：并行竞速 + 缓存 ----------
        async function fetchWithFallback(urls) {
            const CACHE_KEY = 'mv_mirror_winner';
            let orderedUrls = [...urls];

            try {
                const cached = localStorage.getItem(CACHE_KEY);
                if (cached && orderedUrls.includes(cached)) {
                    orderedUrls = [cached, ...orderedUrls.filter(u => u !== cached)];
                }
            } catch (_) { /* ignore */ }

            const fetchWithTimeout = (url, timeout = 5000) => {
                return new Promise((resolve, reject) => {
                    const controller = new AbortController();
                    const timer = setTimeout(() => {
                        controller.abort();
                        reject(new Error(`请求超时: ${url}`));
                    }, timeout);

                    fetch(url, { signal: controller.signal })
                        .then(response => {
                            clearTimeout(timer);
                            resolve(response);
                        })
                        .catch(err => {
                            clearTimeout(timer);
                            reject(err);
                        });
                });
            };

            const isValidContent = (text) => {
                if (!text || text.length < 50) return false;
                if (text.includes('<!DOCTYPE') || text.includes('<html')) return false;
                return /\d+\./.test(text);
            };

            // 并行竞速
            try {
                const text = await Promise.any(
                    orderedUrls.map(async (url) => {
                        const response = await fetchWithTimeout(url);
                        if (!response.ok) throw new Error(`HTTP ${response.status}`);
                        const text = await response.text();
                        if (!isValidContent(text)) throw new Error('无效内容');
                        try {
                            localStorage.setItem(CACHE_KEY, url);
                        } catch (_) {}
                        return text;
                    })
                );
                return text;
            } catch (parallelError) {
                console.warn('并行竞速全部失败，尝试顺序重试', parallelError);
                for (const url of orderedUrls) {
                    try {
                        const response = await fetchWithTimeout(url, 8000);
                        if (!response.ok) continue;
                        const text = await response.text();
                        if (isValidContent(text)) {
                            try {
                                localStorage.setItem(CACHE_KEY, url);
                            } catch (_) {}
                            return text;
                        }
                    } catch (_) { /* continue */ }
                }
                throw new Error('所有镜像地址均不可用，请检查网络或稍后重试');
            }
        }

        // ---------- 解析 MV 文件名 ----------
        function parseMVFileName(filename) {
            var match = filename.match(/^(\d+)\.(.+?)\.(mp4|mp3|mkv|webm|flv|mov|avi)$/i);
            if (!match) return { valid: false };
            var id = match[1];
            var namePart = match[2];
            if (!namePart || namePart.trim().length === 0) return { valid: false };
            if (/^\d+$/.test(namePart.trim())) return { valid: false };
            var songName = namePart;
            var artist = '';
            if (namePart.indexOf('-') !== -1) {
                var parts = namePart.split('-');
                if (parts.length >= 2) {
                    artist = parts[0].trim();
                    songName = parts[1].trim();
                    if (songName.length < 2 && artist.length > 2) {
                        var tmp = songName;
                        songName = artist;
                        artist = tmp;
                    }
                }
            } else if (namePart.indexOf('_') !== -1) {
                var parts2 = namePart.split('_');
                artist = parts2[0].trim();
                songName = parts2[1] ? parts2[1].trim() : parts2[0].trim();
            }
            songName = songName.replace(/\[.*?\]|\(.*?\)/g, '').trim();
            artist = artist.replace(/\[.*?\]|\(.*?\)/g, '').trim();
            if (!songName || songName.length === 0) return { valid: false };
            return {
                valid: true,
                id: id,
                name: songName,
                artist: artist,
                fullName: filename,
                ext: match[3],
                clickCount: 0
            };
        }

        function getFallbackList() {
            var fallbackRaw = [
                "00001.王杰-一场游戏一场梦.mp4", "00002.陈奕迅-十年.mp4", "00003.林俊杰-江南.mp4",
                "00070.李建复-龙的传人.mp4", "00071.优客李林-少年游.mp4", "00072.张国荣-倩女幽魂.mp4",
                "00077.苏小明-军港之夜.mp4", "00078.成龙-醉拳.mp4", "00079.李娜-好人一生平安.mp4",
                "00123.周杰伦-晴天.mp4", "00456.邓丽君-甜蜜蜜.mp4", "00789.Beyond-海阔天空.mp4",
                "00888.刘德华-冰雨.mp4", "00999.张雨生-大海.mp4"
            ];
            var result = [];
            for (var i = 0; i < fallbackRaw.length; i++) {
                var item = parseMVFileName(fallbackRaw[i]);
                if (item.valid) result.push(item);
            }
            return result;
        }

        // ---------- UI 渲染 ----------
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        function escapeRegex(str) {
            return str.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
        }

        function highlightText(text, keyword) {
            if (!keyword || !text) return escapeHtml(text);
            var regex = new RegExp('(' + escapeRegex(keyword) + ')', 'gi');
            return escapeHtml(text).replace(regex, '<span class="highlight">$1</span>');
        }

        function renderMVList() {
            var container = document.getElementById('mvList');
            if (!filteredMVList.length) {
                container.innerHTML = '<div class="empty-state"><div class="icon">🎵</div><div>暂无匹配的MV</div><div style="font-size:0.75rem; margin-top:6px;">试试其他关键词吧</div></div>';
                updateStats();
                return;
            }

            var itemsHtml = '';
            for (var i = 0; i < filteredMVList.length; i++) {
                var item = filteredMVList[i];
                var displayId = currentKeyword ? highlightText(item.id, currentKeyword) : escapeHtml(item.id);
                var displayName = currentKeyword ? highlightText(item.name, currentKeyword) : escapeHtml(item.name);
                var displayArtist = item.artist ? (currentKeyword ? highlightText(item.artist, currentKeyword) : escapeHtml(item.artist)) : '';
                var artistHtml = displayArtist ? '<span class="mv-artist">- ' + displayArtist + '</span>' : '';
                var clickCount = item.clickCount || 0;
                var hotBadge = clickCount > 0 ? '<span class="hot-badge">🔥 ' + clickCount + '</span>' : '';

                itemsHtml += '<div class="mv-item" data-fullname="' + escapeHtml(item.fullName) + '" data-id="' + escapeHtml(item.id) + '" data-name="' + escapeHtml(item.name) + '" data-artist="' + escapeHtml(item.artist) + '" data-unique="' + escapeHtml(getSongUniqueKey(item)) + '">' +
                    '<div class="mv-number">' + displayId + '</div>' +
                    '<div class="mv-name">' + displayName + artistHtml + hotBadge + '</div>' +
                    '<div class="play-icon">▶️</div>' +
                    '</div>';
            }
            container.innerHTML = itemsHtml;

            var mvItems = document.querySelectorAll('.mv-item');
            for (var j = 0; j < mvItems.length; j++) {
                mvItems[j].addEventListener('click', mvClickHandler);
            }
            updateStats();
        }

        function mvClickHandler(e) {
            var target = e.currentTarget;
            var fullName = target.getAttribute('data-fullname') || '';
            var id = target.getAttribute('data-id') || '';
            var name = target.getAttribute('data-name') || '';
            var artist = target.getAttribute('data-artist') || '';

            var mvItem = null;
            for (var i = 0; i < allMVList.length; i++) {
                if (allMVList[i].fullName === fullName && allMVList[i].id === id) {
                    mvItem = allMVList[i];
                    break;
                }
            }
            if (mvItem) {
                incrementClickCount(mvItem);
                applyFilterAndSort();
            }
            var artistText = artist ? ' - ' + artist : '';
            alert('🎬 播放MV\n\n📀 编号: ' + id + '\n🎤 歌曲: ' + name + artistText + '\n📁 文件: ' + fullName + '\n👍 感谢支持，热度 +1');
        }

        function updateStats() {
            var totalSpan = document.getElementById('totalCount');
            var clickValues = Array.from(clickMap.values());
            var totalClicks = 0;
            for (var i = 0; i < clickValues.length; i++) {
                totalClicks += clickValues[i];
            }
            totalSpan.innerHTML = '🎵 共 ' + allMVList.length + ' 首MV | 🔥 总点击: ' + totalClicks;
            var searchInfo = document.getElementById('searchInfo');
            if (currentKeyword && filteredMVList.length === 0) {
                searchInfo.innerHTML = '😔 没有找到匹配的MV，试试其他关键词';
                searchInfo.style.background = '#ffe6e6';
            } else if (currentKeyword) {
                searchInfo.innerHTML = '🔍 找到 ' + filteredMVList.length + ' 个相关MV (共 ' + allMVList.length + ' 首) | 排序: ' + (currentSortMode === 'hot' ? '🔥热门优先' : (currentSortMode === 'random' ? '🎲随机模式' : '📌编号'));
                searchInfo.style.background = '#e0f2e6';
            } else {
                searchInfo.innerHTML = '💡 输入MV名称、歌手名或编号搜索 | 当前排序: ' + (currentSortMode === 'hot' ? '热门优先(点击量)' : (currentSortMode === 'random' ? '随机排序(每次刷新)' : '编号排序'));
                searchInfo.style.background = '#eef2ff';
            }
        }

        function updateOrientationDisplay() {
            var isLandscape = window.matchMedia("(orientation: landscape)").matches;
            var display = document.getElementById('orientationDisplay');
            if (isLandscape) {
                display.innerHTML = '🖥️ 横屏 · 多列网格';
                display.style.background = '#d4edda';
                display.style.color = '#155724';
            } else {
                display.innerHTML = '📱 竖屏 · 大卡片列表';
                display.style.background = '#e9ecef';
                display.style.color = '#495057';
            }
        }

        function resetSearch() {
            document.getElementById('searchInput').value = '';
            currentKeyword = '';
            applyFilterAndSort();
        }

        function searchMV(keyword) {
            currentKeyword = keyword.trim();
            applyFilterAndSort();
        }

        function setSortMode(mode) {
            if (mode === currentSortMode) return;
            currentSortMode = mode;
            var btns = document.querySelectorAll('.sort-btn');
            for (var i = 0; i < btns.length; i++) {
                var btn = btns[i];
                var btnMode = btn.getAttribute('data-sort');
                if (btnMode === mode) btn.classList.add('active');
                else btn.classList.remove('active');
            }
            applyFilterAndSort();
        }

        // ---------- 加载主数据 ----------
        async function loadMVList() {
            var container = document.getElementById('mvList');
            container.innerHTML = '<div class="loading"><div class="icon">🎬</div><div>加载MV列表中...</div></div>';
            try {
                var text = await fetchWithFallback(TXT_FILE_URLS);
                var rawList = text.split(/\r?\n/).map(function(line) { return line.trim(); }).filter(function(line) { return line.length && !line.startsWith('#') && !line.startsWith('//'); });
                if (rawList.length === 0) throw new Error('无数据');
                var parsed = [];
                for (var i = 0; i < rawList.length; i++) {
                    var item = parseMVFileName(rawList[i]);
                    if (item.valid && item.id && item.name) parsed.push(item);
                }
                if (parsed.length === 0) throw new Error('解析无有效条目');
                allMVList = parsed;
            } catch (e) {
                console.warn("使用备用数据", e);
                allMVList = getFallbackList();
            }
            allMVList.排序(function(a, b) { return (parseInt(a.id) || 0) - (parseInt(b.id) || 0); });
            loadClickCounts();
            updateClickCountInAllList();
            applyFilterAndSort();
            updateOrientationDisplay();
        }

        // ---------- 初始化事件 ----------
        function initSortButtons() {
            var defaultBtn = document.querySelector('.sort-btn[data-sort="default"]');
            var hotBtn = document.querySelector('.sort-btn[data-sort="hot"]');
            var randomBtn = document.querySelector('.sort-btn[data-sort="random"]');
            if (defaultBtn) defaultBtn.addEventListener('click', function() { setSortMode('default'); });
            if (hotBtn) hotBtn.addEventListener('click', function() { setSortMode('hot'); });
            if (randomBtn) randomBtn.addEventListener('click', function() { setSortMode('random'); });
            var resetRankBtn = document.getElementById('resetRankBtn');
            if (resetRankBtn) {
                resetRankBtn.addEventListener('click', function() {
                    if (confirm('重置所有MV的点击热度记录？数据将清空。')) {
                        resetAllClickCounts();
                    }
                });
            }
        }

        function initSearchEvents() {
            var searchBtn = document.getElementById('searchBtn');
            var resetBtn = document.getElementById('resetBtn');
            var searchInput = document.getElementById('searchInput');
            searchBtn.addEventListener('click', function() { searchMV(searchInput.value); });
            resetBtn.addEventListener('click', function() { resetSearch(); });
            searchInput.addEventListener('input', function(e) { searchMV(e.target.value); });
            searchInput.addEventListener('keypress', function(e) { if (e.key === 'Enter') searchMV(searchInput.value); });
        }

        function initOrientationListener() {
            window.addEventListener('resize', function() { updateOrientationDisplay(); renderMVList(); });
            window.addEventListener('orientationchange', function() { setTimeout(function() { updateOrientationDisplay(); renderMVList(); }, 50); });
        }

        async function init() {
            await loadMVList();
            initSortButtons();
            initSearchEvents();
            initOrientationListener();
        }

        init();
    </script>
</body>

</html>
